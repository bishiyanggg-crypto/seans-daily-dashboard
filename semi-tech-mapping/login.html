<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Semi Tech Mapping</title>
  <style>
:root {
  --bg:#f5f7f6;
  --paper:#ffffff;
  --ink:#17211d;
  --muted:#5e6b65;
  --line:#d8e0dd;
  --blue:#2457a6;
  --teal:#0e7a6f;
  --green:#4e7d38;
  --amber:#af6b1b;
  --red:#a33a3a;
  --violet:#5a4b9f;
  --chip:#eef3f1;
  --shadow:0 12px 28px rgba(30,45,40,.08);
}
* { box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  margin:0;
  padding-top:64px;
  background:var(--bg);
  color:var(--ink);
  font-family:Inter,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
  letter-spacing:0;
  overflow-x:hidden;
}
a { color:inherit; }
p,
span,
dd,
td,
th,
h2,
h3,
b,
strong,
.dek,
.card,
.panel,
.metric,
.guide-step,
.scenario-meta div,
.path-step,
.node-card,
.detail-pane {
  overflow-wrap:anywhere;
}
.app-nav {
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:1000;
  height:64px;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(12px);
}
.nav-frame {
  max-width:1500px;
  height:100%;
  margin:0 auto;
  padding:0 clamp(18px,3vw,44px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  min-width:0;
}
.brand {
  text-decoration:none;
  font-weight:900;
  color:var(--ink);
  white-space:nowrap;
  flex:0 0 auto;
}
.brand span {
  display:block;
  color:var(--muted);
  font-size:11px;
  font-weight:750;
  margin-top:2px;
}
.nav-links {
  display:flex;
  align-items:center;
  gap:6px;
  overflow-x:auto;
  max-width:100%;
  min-width:0;
  flex:1 1 auto;
  scrollbar-width:thin;
  -webkit-overflow-scrolling:touch;
}
.nav-links a {
  min-height:40px;
  display:inline-flex;
  align-items:center;
  border:1px solid transparent;
  border-radius:999px;
  padding:0 11px;
  text-decoration:none;
  color:#40504b;
  font-size:12px;
  font-weight:850;
  white-space:nowrap;
}
.nav-links a:hover,
.nav-links a.active {
  background:#eef3f1;
  border-color:var(--line);
  color:var(--ink);
}
.logout-btn {
  min-height:36px;
  border:1px solid #cad9d5;
  border-radius:999px;
  padding:0 11px;
  background:#fff;
  color:#40504b;
  font:inherit;
  font-size:12px;
  font-weight:850;
  cursor:pointer;
  white-space:nowrap;
}
.logout-btn:hover {
  background:#f7faf9;
  color:var(--ink);
}
.login-body {
  padding-top:0;
  min-height:100vh;
  background:
    linear-gradient(120deg, rgba(36,87,166,.08), transparent 38%),
    linear-gradient(300deg, rgba(14,122,111,.1), transparent 40%),
    var(--bg);
}
.login-shell {
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:32px 18px;
}
.login-panel {
  width:min(420px, 100%);
  border:1px solid var(--line);
  border-radius:10px;
  padding:28px;
  background:rgba(255,255,255,.96);
  box-shadow:var(--shadow);
}
.login-panel h1 {
  margin:0;
  color:var(--ink);
  font-size:28px;
  line-height:1.1;
}
.login-panel p {
  margin:10px 0 24px;
  color:var(--muted);
  line-height:1.6;
}
.login-form {
  display:grid;
  gap:14px;
}
.login-field {
  display:grid;
  gap:6px;
}
.login-field span {
  color:#334155;
  font-size:12px;
  font-weight:850;
  text-transform:uppercase;
}
.login-field input {
  width:100%;
  height:44px;
  border:1px solid #cbd8d4;
  border-radius:8px;
  padding:0 12px;
  background:#fff;
  color:var(--ink);
  font:inherit;
}
.login-submit {
  height:44px;
  border:0;
  border-radius:999px;
  background:#12201b;
  color:#fff;
  font:inherit;
  font-weight:900;
  cursor:pointer;
}
.login-error {
  min-height:18px;
  color:var(--red);
  font-size:12px;
  font-weight:800;
}
.login-footnote {
  margin-top:18px;
  color:var(--muted);
  font-size:11px;
  line-height:1.5;
}
.page {
  max-width:1500px;
  margin:0 auto;
  padding:26px clamp(18px,3vw,44px) 54px;
}
.hero {
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(270px,330px);
  gap:22px;
  align-items:start;
  padding:10px 0 18px;
}
.eyebrow {
  display:inline-flex;
  align-items:center;
  margin:0 0 12px;
  padding:5px 9px;
  border:1px solid #cad9d5;
  border-radius:999px;
  color:var(--teal);
  background:rgba(255,255,255,.82);
  font-size:12px;
  font-weight:850;
}
h1 {
  margin:0;
  font-size:52px;
  line-height:1.04;
  letter-spacing:0;
}
.dek {
  max-width:980px;
  margin:14px 0 0;
  color:var(--muted);
  font-size:17px;
  line-height:1.65;
}
.hero-actions {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:16px;
}
.btn {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  max-width:100%;
  border:1px solid var(--line);
  border-radius:999px;
  padding:0 13px;
  background:#fff;
  text-decoration:none;
  font-size:13px;
  font-weight:850;
  cursor:pointer;
  line-height:1.2;
  text-align:center;
  white-space:normal;
}
.btn.primary {
  background:var(--ink);
  border-color:var(--ink);
  color:#fff;
}
.metrics {
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:9px;
}
.metric {
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  padding:13px;
  box-shadow:var(--shadow);
}
.metric strong {
  display:block;
  font-size:26px;
  line-height:1.05;
}
.metric span {
  display:block;
  margin-top:5px;
  color:var(--muted);
  font-size:12px;
}
.section-title {
  display:flex;
  align-items:end;
  justify-content:space-between;
  gap:20px;
  margin:28px 0 13px;
  scroll-margin-top:84px;
}
.section-title h2 {
  margin:0;
  font-size:26px;
  line-height:1.18;
}
.section-title p {
  max-width:790px;
  margin:0;
  color:var(--muted);
  line-height:1.55;
  font-size:14px;
}
.module-grid,
.card-grid {
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:13px;
}
.module-card,
.panel,
.card {
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
  min-width:0;
}
.module-card {
  padding:16px;
  text-decoration:none;
}
.module-card h3,
.card h3,
.panel h3 {
  margin:0 0 8px;
  font-size:17px;
  line-height:1.35;
}
.module-card p,
.card p,
.panel p {
  margin:0;
  color:var(--muted);
  font-size:13px;
  line-height:1.55;
}
.module-card b {
  display:inline-flex;
  margin-top:12px;
  color:var(--blue);
  font-size:12px;
}
.card {
  padding:14px;
}
.card dl,
.panel dl {
  display:grid;
  grid-template-columns:112px minmax(0,1fr);
  gap:7px 10px;
  margin:0;
}
.card dt,
.panel dt {
  color:#334155;
  font-size:12px;
  font-weight:850;
}
.card dd,
.panel dd {
  margin:0;
  color:var(--muted);
  font-size:13px;
  line-height:1.5;
}
.split {
  display:grid;
  grid-template-columns:minmax(0,1.35fr) minmax(360px,.8fr);
  gap:16px;
  align-items:start;
}
.panel {
  padding:16px;
}
.pill-row {
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin:10px 0 0;
}
.pill-row button {
  min-height:38px;
  max-width:100%;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  padding:0 11px;
  color:#40504b;
  font-size:12px;
  font-weight:850;
  cursor:pointer;
  line-height:1.2;
  white-space:normal;
}
.pill-row button.active {
  background:var(--ink);
  color:#fff;
  border-color:var(--ink);
}
.usage-board {
  display:grid;
  grid-template-columns:minmax(0,.85fr) minmax(0,1.15fr);
  gap:12px;
  margin:4px 0 16px;
  align-items:stretch;
}
.usage-primary,
.usage-card,
.cycle-lens,
.cycle-card {
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
  min-width:0;
}
.usage-primary {
  padding:16px;
}
.usage-primary b,
.cycle-lens b,
.cycle-card b {
  display:block;
  color:#334155;
  font-size:12px;
  line-height:1.35;
}
.usage-primary h2 {
  margin:8px 0 8px;
  font-size:22px;
  line-height:1.22;
}
.usage-primary p {
  margin:0;
  color:var(--muted);
  font-size:13px;
  line-height:1.55;
}
.usage-steps {
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
.usage-card {
  padding:12px;
}
.usage-card b {
  display:block;
  margin-bottom:5px;
  font-size:13px;
}
.usage-card span {
  display:block;
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
}
.reader-guide {
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
  margin:6px 0 16px;
}
.guide-step {
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
  padding:12px;
}
.guide-step b {
  display:block;
  margin-bottom:5px;
  font-size:13px;
}
.guide-step span {
  display:block;
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
}
.cycle-overview {
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:10px;
  margin:0 0 16px;
}
.cycle-lens {
  padding:12px;
}
.cycle-lens span,
.cycle-card span {
  display:block;
  margin-top:5px;
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
}
.logic-wrap {
  display:grid;
  grid-template-columns:minmax(0,1.18fr) minmax(390px,.82fr);
  gap:16px;
  align-items:start;
}
.logic-canvas {
  position:relative;
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.logic-grid {
  position:relative;
  z-index:2;
  padding:14px;
  display:grid;
  grid-template-columns:repeat(6,minmax(0,1fr));
  gap:10px;
}
.logic-col {
  display:flex;
  flex-direction:column;
  gap:8px;
  min-width:0;
}
.logic-col h3 {
  margin:0;
  padding-bottom:8px;
  border-bottom:1px solid var(--line);
  color:#40504b;
  font-size:12px;
  line-height:1.3;
  text-transform:uppercase;
}
.logic-col h3 span {
  display:block;
  margin-top:3px;
  color:var(--muted);
  font-weight:600;
  text-transform:none;
}
.map-node {
  appearance:none;
  min-height:76px;
  border:1px solid var(--line);
  border-left:3px solid #c7d2cf;
  border-radius:8px;
  background:rgba(255,255,255,.94);
  color:var(--ink);
  text-align:left;
  padding:9px;
  cursor:pointer;
  box-shadow:0 2px 8px rgba(30,45,40,.04);
  transition:opacity 120ms ease, border-color 120ms ease, background 120ms ease;
}
.map-node:hover,
.map-node.active {
  border-color:var(--blue);
  border-left-color:var(--blue);
  background:#f4f7fd;
}
.map-node.is-related {
  border-color:#a9bdcf;
  background:#f9fbfc;
}
.map-node.is-source {
  border-left-color:var(--teal);
}
.map-node.is-target {
  border-left-color:var(--blue);
}
.map-node.dimmed {
  opacity:.38;
}
.map-node.demand {
  border-left-color:var(--amber);
}
.map-node b {
  display:block;
  font-size:13px;
  line-height:1.25;
}
.map-node small {
  display:block;
  margin-top:7px;
  color:var(--muted);
  font-size:11px;
  line-height:1.35;
}
.edge-svg {
  display:none;
}
.detail-pane {
  position:sticky;
  top:82px;
  max-height:calc(100vh - 100px);
  overflow:auto;
}
.relationship-map {
  margin:12px 0;
  border:1px solid var(--line);
  border-radius:8px;
  background:#fbfcfb;
  padding:10px;
}
.relationship-title {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  margin-bottom:9px;
}
.relationship-title b {
  display:block;
  color:#334155;
  font-size:12px;
}
.relationship-title span {
  display:block;
  max-width:520px;
  color:var(--muted);
  font-size:11px;
  line-height:1.45;
}
.relationship-grid {
  display:grid;
  grid-template-columns:minmax(0,1fr) 26px minmax(0,.82fr) 26px minmax(0,1fr);
  gap:7px;
  align-items:stretch;
}
.rel-col {
  min-width:0;
  border:1px solid #e0e7e4;
  border-radius:8px;
  background:#fff;
  padding:8px;
}
.rel-col h4 {
  margin:0 0 7px;
  color:#334155;
  font-size:11px;
  line-height:1.3;
  text-transform:uppercase;
}
.rel-arrow {
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--blue);
  font-size:18px;
  font-weight:900;
}
.rel-node {
  display:block;
  width:100%;
  margin-top:6px;
  border:1px solid #c8d6d2;
  border-left:3px solid #c8d6d2;
  border-radius:8px;
  background:#fff;
  color:var(--ink);
  padding:7px;
  text-align:left;
  cursor:pointer;
}
.rel-node:first-of-type { margin-top:0; }
.rel-node:hover {
  border-color:var(--blue);
  border-left-color:var(--blue);
  background:#f4f7fd;
}
.rel-node.current {
  border-color:var(--blue);
  border-left-color:var(--blue);
  background:#eef5ff;
  cursor:default;
}
.rel-node.demand {
  border-left-color:var(--amber);
}
.rel-node b {
  display:block;
  font-size:12px;
  line-height:1.25;
}
.rel-node small,
.rel-node span {
  display:block;
  margin-top:4px;
  color:var(--muted);
  font-size:10px;
  line-height:1.35;
}
.rel-node-field {
  display:block;
  margin-top:6px;
  padding-top:6px;
  border-top:1px solid #edf0f5;
}
.rel-node-field em {
  display:block;
  margin-bottom:2px;
  color:#334155;
  font-size:9px;
  font-style:normal;
  font-weight:900;
  letter-spacing:0;
  text-transform:uppercase;
}
.rel-node-field small {
  margin-top:0;
  color:#475569;
  font-size:10px;
}
.rel-node-field.companies {
  padding-bottom:1px;
}
.rel-text {
  margin-top:6px;
  border:1px dashed #c8d6d2;
  border-radius:8px;
  padding:7px;
  color:var(--muted);
  background:#fbfcfb;
  font-size:11px;
  line-height:1.45;
}
.rel-text:first-of-type { margin-top:0; }

/* Value-chain page redesign: more workbench, fewer stacked cards. */
.value-page {
  max-width:1560px;
  padding-bottom:22px;
}
.value-hero {
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(250px,300px);
  gap:26px;
  align-items:start;
  padding:18px 0 18px;
  border-bottom:1px solid var(--line);
}
.value-hero .metrics {
  align-self:start;
  grid-template-columns:repeat(2,minmax(0,1fr));
}
.value-page .metric {
  box-shadow:none;
  background:#fbfcfb;
}
.value-page .pill-row {
  gap:6px;
  margin-top:18px;
}
.value-page .pill-row button {
  min-height:34px;
  border-color:#cbd8d4;
  background:#fff;
}
.value-page .pill-row button.active {
  background:#12201b;
  color:#fff;
}
.read-path {
  display:grid;
  grid-template-columns:minmax(230px,.45fr) minmax(0,1fr);
  gap:20px;
  padding:18px 0;
  border-bottom:1px solid var(--line);
}
.read-path-intro {
  padding-right:18px;
  border-right:1px solid var(--line);
}
.read-path-intro b,
.workspace-label b {
  display:block;
  color:#334155;
  font-size:12px;
  text-transform:uppercase;
}
.read-path-intro span,
.workspace-label span {
  display:block;
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
  line-height:1.55;
}
.read-path ol {
  list-style:none;
  margin:0;
  padding:0;
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:0;
  counter-reset:readstep;
}
.read-path li {
  position:relative;
  padding:2px 16px 0 22px;
  border-left:1px solid #cbd8d4;
  min-width:0;
}
.read-path li::before {
  counter-increment:readstep;
  content:"0" counter(readstep);
  position:absolute;
  left:-1px;
  top:0;
  transform:translateX(-50%);
  width:24px;
  height:24px;
  display:grid;
  place-items:center;
  border:1px solid #cbd8d4;
  border-radius:999px;
  background:var(--bg);
  color:var(--blue);
  font-size:10px;
  font-weight:900;
}
.read-path li b {
  display:block;
  font-size:13px;
}
.read-path li span {
  display:block;
  margin-top:6px;
  color:var(--muted);
  font-size:12px;
  line-height:1.45;
}
.value-page .cycle-overview {
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:0;
  margin:0;
  padding:14px 0;
  border-bottom:1px solid var(--line);
}
.value-page .cycle-lens {
  box-shadow:none;
  border:0;
  border-left:1px solid var(--line);
  border-radius:0;
  background:transparent;
  padding:2px 16px;
}
.value-page .cycle-lens:first-child {
  border-left:0;
  padding-left:0;
}
.value-page .path-panel {
  margin:18px 0 18px;
  padding:0;
  border:0;
  box-shadow:none;
  background:transparent;
}
.value-page .path-panel-head {
  margin:0 0 12px;
  padding-bottom:10px;
  border-bottom:1px solid var(--line);
}
.value-page .scenario-meta {
  margin:0 0 12px;
  grid-template-columns:minmax(0,1.1fr) minmax(0,1fr) minmax(0,1.2fr);
  gap:0;
  border:1px solid var(--line);
  border-radius:8px;
  overflow:hidden;
  background:#fff;
}
.value-page .scenario-meta div {
  border:0;
  border-left:1px solid var(--line);
  border-radius:0;
  background:#fff;
  padding:11px 12px;
}
.value-page .scenario-meta div:first-child {
  border-left:0;
}
.value-page .path-steps {
  grid-template-columns:repeat(6,minmax(0,1fr));
  gap:0;
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  overflow:hidden;
}
.value-page .path-step {
  border:0;
  border-left:1px solid var(--line);
  border-radius:0;
  background:#fff;
  padding:12px;
}
.value-page .path-step:first-child {
  border-left:0;
}
.value-page .path-step strong {
  color:var(--blue);
}
.stage-workbench {
  display:grid;
  grid-template-columns:minmax(260px,.62fr) minmax(0,1fr);
  gap:0;
  border:1px solid var(--line);

<body class="login-body">
  <main class="login-shell">
    <section class="login-panel" aria-label="Login">
      <h1>Semi Tech Mapping</h1>
      <p>请输入账号密码后访问产业链 mapping 和 coverage universe。</p>
      <form class="login-form" id="loginForm">
        <label class="login-field">
          <span>Username</span>
          <input id="username" name="username" autocomplete="username" autofocus required>
        </label>
        <label class="login-field">
          <span>Password</span>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="login-submit" type="submit">Login</button>
        <div class="login-error" id="loginError" role="alert"></div>
      </form>
      <div class="login-footnote">Static front-end gate for daily research access. Session expires automatically after 24 hours.</div>
    </section>
  </main>
  <script>
  const AUTH_KEY = 'semiTechMappingAuth';
  const AUTH_USER = 'sean';
  const AUTH_PASSWORD_HASH = '9a1d3dd35f70e53eb58d3c4d39431457fc8eb8b83da6ddd849d642e41c6c372d';
  const SESSION_MS = 24 * 60 * 60 * 1000;
  const form = document.getElementById('loginForm');
  const errorBox = document.getElementById('loginError');

  function fallbackUrl() {
    return 'semi_industry_mapping.html';
  }

  function safeNext() {
    const value = new URLSearchParams(location.search).get('next');
    if (!value) return fallbackUrl();
    try {
      const url = new URL(value, location.href);
      if (location.protocol === 'file:' && url.protocol === 'file:') return url.href;
      if (url.origin === location.origin) return url.href;
    } catch (error) {}
    return fallbackUrl();
  }

  async function sha256(value) {
    const data = new TextEncoder().encode(value);
    const digest = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(digest)).map(byte => byte.toString(16).padStart(2, '0')).join('');
  }

  async function passwordMatches(value) {
    try {
      return await sha256(value) === AUTH_PASSWORD_HASH;
    } catch (error) {
      return value === ['b','s','y','1','2','3','3','2','1'].join('');
    }
  }

  try {
    const raw = localStorage.getItem(AUTH_KEY);
    const auth = raw ? JSON.parse(raw) : null;
    if (auth && auth.user === AUTH_USER && Number(auth.expiresAt) > Date.now()) {
      location.replace(safeNext());
    }
  } catch (error) {}

  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    errorBox.textContent = '';
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (username === AUTH_USER && await passwordMatches(password)) {
      localStorage.setItem(AUTH_KEY, JSON.stringify({
        user: AUTH_USER,
        issuedAt: Date.now(),
        expiresAt: Date.now() + SESSION_MS
      }));
      location.replace(safeNext());
      return;
    }
    errorBox.textContent = '用户名或密码不正确';
  });
  </script>
</body>
