const columns = [
  {key:"company",label:"公司名称",type:"text",className:"company"},
  {key:"ticker",label:"Ticker",type:"text",className:"ticker"},
  {key:"category",label:"Category",type:"text",className:"category"},
  {key:"dailyReturn",label:"日涨跌幅",type:"number",formatter:(v,r)=>formatReturn(v,r,"dailyReturn")},
  {key:"wtdReturn",label:"WTD涨跌幅",type:"number",formatter:(v,r)=>formatReturn(v,r,"wtdReturn")},
  {key:"qtdReturn",label:"QTD涨跌幅",type:"number",formatter:(v,r)=>formatReturn(v,r,"qtdReturn")},
  {key:"ytdReturn",label:"YTD涨跌幅",type:"number",formatter:(v,r)=>formatReturn(v,r,"ytdReturn")},
  {key:"marketCap",label:"市值",type:"number",formatter:formatBn},
  {key:"profitYoy",label:"年利润增速",type:"number",formatter:formatPctPlain},
  {key:"adjPe",label:"经调PE",type:"number",formatter:formatMultiple},
  {key:"revenueYoy",label:"年收入增速",type:"number",formatter:formatPctPlain},
  {key:"ps",label:"PS",type:"number",formatter:formatMultiple},
];
const state = {sortKey:"dailyReturn", sortDir:"desc", filters:{}, openFilter:null};
function escapeHtml(value){return String(value ?? "").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[ch]));}
function asNumber(value){return typeof value==="number" && Number.isFinite(value) ? value : null;}
function formatPercent(value){const n=asNumber(value); return n===null ? "N/A" : `${n>=0?"+":""}${(n*100).toFixed(1)}%`;}
function formatPctPlain(value){const n=asNumber(value); return n===null ? "N/A" : `${(n*100).toFixed(1)}%`;}
function formatBn(value){const n=asNumber(value); return n===null ? "N/A" : `$${n.toFixed(1)}bn`;}
function formatMultiple(value){const n=asNumber(value); return n===null ? "N/A" : `${n.toFixed(1)}x`;}
function formatReturn(value,row,field){const n=asNumber(value); if(n===null)return '<span class="muted">N/A</span>'; const cls=n>=0?"gain":"loss"; return `<span class="${cls}">${formatPercent(n)}</span>`;}
function displayValue(row,col){const value=row[col.key]; if(col.formatter)return stripHtml(col.formatter(value,row)); if(value===null||value===undefined||value==="")return "N/A"; return String(value);}
function cellHtml(row,col){const value=row[col.key]; return col.formatter ? col.formatter(value,row) : escapeHtml(value ?? "N/A");}
function stripHtml(html){const div=document.createElement("div"); div.innerHTML=html; return div.textContent || "";}
function valueKey(row,col){return displayValue(row,col);}
function activeSet(key){return state.filters[key] || null;}
function filteredRows(){return DATA.rows.filter(row=>columns.every(col=>{const set=activeSet(col.key); return !set || set.has(valueKey(row,col));}));}
function sortedRows(rows){const col=columns.find(c=>c.key===state.sortKey); const dir=state.sortDir==="asc"?1:-1; return [...rows].sort((a,b)=>{let av=a[state.sortKey], bv=b[state.sortKey]; if(col?.type==="number"){av=asNumber(av); bv=asNumber(bv); if(av===null&&bv===null)return 0; if(av===null)return 1; if(bv===null)return -1; return (av-bv)*dir;} return String(av ?? "").localeCompare(String(bv ?? ""),"zh-Hans-CN")*dir;});}
function colDefaultDir(key){return ["marketCap","profitYoy","revenueYoy","dailyReturn","wtdReturn","qtdReturn","ytdReturn"].includes(key) ? "desc" : "asc";}
function uniqueOptions(col){const values=[...new Set(DATA.rows.map(row=>valueKey(row,col)))]; return values.sort((a,b)=>{if(a==="N/A")return 1; if(b==="N/A")return -1; return String(a).localeCompare(String(b),"zh-Hans-CN",{numeric:true});});}
function renderMetrics(){const m=DATA.metadata; const items=[["Price effective",m.priceEffectiveLabel||m.dashboardAsOf||"N/A"],["Price snapshot",m.priceSnapshotAt||"N/A"],["Prices through",m.dashboardAsOf||"N/A"],["Coverage",m.coverageCount],["Price matched",`${m.priceMatchedCount} / ${m.coverageCount}`],["Stale prices",m.stalePriceCount],["Quality flags",m.qualityFlaggedCount],["Fundamentals","N/A"]]; document.getElementById("metrics").innerHTML=items.map(([k,v])=>`<div class="metric"><span>${escapeHtml(k)}</span><strong>${escapeHtml(v)}</strong></div>`).join("");}
function summaryRowsHtml(rows){return rows.map(row=>`<tr><td class="company">${escapeHtml(row.company)}</td><td class="ticker">${escapeHtml(row.ticker)}</td><td class="category">${escapeHtml(row.category)}</td><td class="num ${row.returnValue>=0?"gain":"loss"}">${formatPercent(row.returnValue)}</td><td class="reason-cell">${escapeHtml(row.reason)}</td></tr>`).join("");}
function sortedSummaryRows(s){return [...s.topRows,...s.bottomRows].sort((a,b)=>(asNumber(b.returnValue) ?? -Infinity)-(asNumber(a.returnValue) ?? -Infinity));}
function renderSummaries(){document.getElementById("summary-grid").innerHTML=DATA.summaries.map(s=>`<article class="summary"><h2>${escapeHtml(s.title)}</h2><div class="summary-body"><table class="summary-table"><thead><tr><th>公司名称</th><th>Ticker</th><th>Category</th><th>${escapeHtml(s.label)}涨跌幅</th><th>涨跌原因</th></tr></thead><tbody>${summaryRowsHtml(sortedSummaryRows(s))}</tbody></table></div></article>`).join("");}
function renderNote(){const m=DATA.metadata; document.getElementById("source-note").innerHTML=`${escapeHtml(m.fundamentalStatus)}<br>${escapeHtml(m.researchPosture)}<br>${escapeHtml(m.qualityRule)}`;}
function renderTable(){closeFilter(); const rows=sortedRows(filteredRows()); document.getElementById("table-count").textContent=`${rows.length} / ${DATA.rows.length} rows`; const head=columns.map(col=>{const mark=state.sortKey===col.key?(state.sortDir==="asc"?"▲":"▼"):"↕"; const active=activeSet(col.key) ? " active" : ""; return `<th><div class="hcell"><button class="sort" data-sort="${col.key}">${escapeHtml(col.label)} <span class="muted">${mark}</span></button><button class="filter-btn${active}" data-filter="${col.key}" aria-label="Filter ${escapeHtml(col.label)}">▾</button></div></th>`;}).join(""); const body=rows.map(row=>`<tr>${columns.map(col=>`<td class="${col.type==="number"?"num":(col.className||"")}">${cellHtml(row,col)}</td>`).join("")}</tr>`).join(""); document.getElementById("coverage-table").innerHTML=`<thead><tr>${head}</tr></thead><tbody>${body}</tbody>`; document.querySelectorAll("[data-sort]").forEach(btn=>btn.addEventListener("click",()=>{const key=btn.dataset.sort; if(state.sortKey===key)state.sortDir=state.sortDir==="asc"?"desc":"asc"; else{state.sortKey=key; state.sortDir=colDefaultDir(key);} renderTable();})); document.querySelectorAll("[data-filter]").forEach(btn=>btn.addEventListener("click",event=>openFilter(event.currentTarget.dataset.filter,event.currentTarget)));}
function openFilter(key,button){const col=columns.find(c=>c.key===key); const menu=document.getElementById("filter-menu"); const options=uniqueOptions(col); const active=activeSet(key) || new Set(options); menu.innerHTML=`<div class="filter-title">${escapeHtml(col.label)}</div><div class="filter-actions"><button data-action="all">全选</button><button data-action="clear">清空</button><button data-action="close">关闭</button></div><div class="options">${options.map((opt,i)=>`<label class="option"><input type="checkbox" data-value="${escapeHtml(opt)}" ${active.has(opt)?"checked":""}> <span>${escapeHtml(opt)}</span></label>`).join("")}</div>`; const rect=button.getBoundingClientRect(); menu.style.left=`${Math.min(rect.left, window.innerWidth-280)}px`; menu.style.top=`${rect.bottom+6}px`; menu.classList.add("open"); state.openFilter=key; menu.querySelector('[data-action="all"]').addEventListener("click",()=>{delete state.filters[key]; renderTable();}); menu.querySelector('[data-action="clear"]').addEventListener("click",()=>{state.filters[key]=new Set(); renderTable();}); menu.querySelector('[data-action="close"]').addEventListener("click",closeFilter); menu.querySelectorAll("input[type=checkbox]").forEach(input=>input.addEventListener("change",()=>{const checked=[...menu.querySelectorAll("input[type=checkbox]:checked")].map(x=>x.dataset.value); if(checked.length===options.length)delete state.filters[key]; else state.filters[key]=new Set(checked); renderTable();}));}
function closeFilter(){document.getElementById("filter-menu").classList.remove("open"); state.openFilter=null;}
document.addEventListener("click",event=>{const menu=document.getElementById("filter-menu"); if(!menu.contains(event.target) && !event.target.closest("[data-filter]"))closeFilter();});
renderMetrics(); renderSummaries(); renderNote(); renderTable();
