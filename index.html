<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Sean's Daily Dashboard</title>
<style>
:root{--bg:#f4f5f7;--panel:#fff;--ink:#171717;--muted:#667085;--line:#d8dde5;--accent:#0f766e;--danger:#be123c}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 18% 18%,rgba(15,118,110,.18) 0,transparent 34%),linear-gradient(135deg,#f7f8fa 0%,#eef1f5 48%,#ffffff 100%);font-family:Inter,Arial,"Microsoft YaHei","PingFang SC",sans-serif;color:var(--ink);letter-spacing:0}
.login{width:min(430px,calc(100vw - 32px));background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:8px;padding:30px;box-shadow:0 24px 70px rgba(16,24,40,.18)}
.mark{width:42px;height:42px;border-radius:8px;background:#111411;color:#f8faf5;display:grid;place-items:center;font-weight:850;margin-bottom:18px}
h1{font-size:24px;line-height:1.16;margin:0 0 8px}
p{margin:0 0 20px;color:var(--muted);font-size:14px;line-height:1.5}
label{display:block;font-size:12px;color:#44403c;margin:14px 0 6px;font-weight:700}
input{width:100%;height:42px;border:1px solid var(--line);border-radius:7px;background:#fff;color:#171717;padding:0 12px;font-size:15px;outline:none}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,118,110,.18)}
button{width:100%;height:43px;margin-top:18px;border:0;border-radius:7px;background:var(--accent);color:#fff;font-weight:800;font-size:15px;cursor:pointer}
button:disabled{opacity:.65;cursor:wait}
.error{min-height:20px;margin-top:12px;color:var(--danger);font-size:13px}
.foot{margin-top:16px;color:#8a94a3;font-size:12px;line-height:1.45}
noscript{position:fixed;left:16px;right:16px;bottom:16px;color:#fff;background:#7f1d1d;padding:12px;border-radius:8px;text-align:center}
</style>
</head>
<body>
<form class="login" id="login-form">
  <div class="mark">SD</div>
  <h1>Sean's Daily Dashboard</h1>
  <p>输入账号密码后进入统一 Dashboard。</p>
  <label for="username">账号</label>
  <input id="username" name="username" autocomplete="username" required autofocus>
  <label for="password">密码</label>
  <input id="password" name="password" type="password" autocomplete="current-password" required>
  <button id="submit" type="submit">进入 Dashboard</button>
  <div class="error" id="error" role="alert"></div>
  <div class="foot">Static page · decrypted locally in your browser.</div>
</form>

function b64ToBytes(value){
  const raw = atob(value);
  const out = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i += 1) out[i] = raw.charCodeAt(i);
  return out;
}
function concatBytes(a,b){
  const out = new Uint8Array(a.length + b.length);
  out.set(a,0); out.set(b,a.length);
  return out;
}

  );
  const encrypted = concatBytes(b64ToBytes(PAYLOAD.ciphertext), b64ToBytes(PAYLOAD.tag));
  const plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv:b64ToBytes(PAYLOAD.iv) }, key, encrypted);
  return new TextDecoder().decode(plain);
}
document.getElementById("login-form").addEventListener("submit", async (event) => {
  event.preventDefault();
  const form = event.currentTarget;
  const button = document.getElementById("submit");
  const error = document.getElementById("error");
  button.disabled = true;
  error.textContent = "";
  try {
    const html = await decryptDashboard(form.username.value.trim(), form.password.value);
    document.open();
    document.write(html);
    document.close();
  } catch {
    error.textContent = "账号或密码不正确。";
    button.disabled = false;
  }
});
